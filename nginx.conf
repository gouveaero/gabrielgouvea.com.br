server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # hashed build assets — safe to cache forever (filename changes on rebuild)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # static media / fonts — moderate cache so photo swaps surface within ~30d
    location ~* \.(?:png|jpg|jpeg|webp|svg|ico|woff|woff2|ttf|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # SPA fallback (single page)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
